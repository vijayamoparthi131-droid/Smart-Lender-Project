<!DOCTYPE html>
<html>
<head>

    <title>Loan Prediction</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

<h1>Loan Prediction Form</h1>

<form id="loanForm" action="/submit" method="POST">

<label>Gender</label>

<select name="Gender" required>
    <option value="1">Male</option>
    <option value="0">Female</option>
</select>

<label>Married</label>

<select name="Married" required>
    <option value="1">Yes</option>
    <option value="0">No</option>
</select>

<label>Dependents</label>

<input type="number" name="Dependents" min="0" max="5" required>

<label>Education</label>

<select name="Education" required>
    <option value="1">Graduate</option>
    <option value="0">Not Graduate</option>
</select>

<label>Self Employed</label>

<select name="Self_Employed" required>
    <option value="1">Yes</option>
    <option value="0">No</option>
</select>

<label>Applicant Income</label>

<input type="number" name="ApplicantIncome" required>

<label>Coapplicant Income</label>

<input type="number" name="CoapplicantIncome" required>

<label>Loan Amount</label>

<input type="number" name="LoanAmount" required>

<label>Loan Amount Term</label>

<input type="number" name="Loan_Amount_Term" value="360" required>

<label>Credit History</label>

<select name="Credit_History" required>
    <option value="1">Good</option>
    <option value="0">Bad</option>
</select>

<label>Property Area</label>

<select name="Property_Area" required>
    <option value="0">Rural</option>
    <option value="1">Semiurban</option>
    <option value="2">Urban</option>
</select>

<br><br>

<button type="submit">
    Predict Loan
</button>

</form>

<!-- Loading Spinner -->

<div id="loading">

    <div class="loader"></div>

    <h3>Predicting Loan Status...</h3>

    <p>Please wait while the model processes your application.</p>

</div>

</div>

<script>

document.getElementById("loanForm").addEventListener("submit", function(){

    document.getElementById("loading").style.display = "block";

});

</script>

</body>
</html>
